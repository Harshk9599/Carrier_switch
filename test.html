    <script>
      // Whenever quantity changes, update all hidden inputs named "quantity"
      function changeQuantity(delta) {
        const qtyVisible = document.getElementById("quantity");
        const newVal = Math.max(1, parseInt(qtyVisible.value, 10) + delta);
        qtyVisible.value = newVal;

        // Update every <input name="quantity"> on the page (hero, main, footer)
        document.querySelectorAll('input[name="quantity"]').forEach(el => {
          el.value = newVal;
        });
      }

      // Ensure hidden inputs are synced right before any Add to Cart submits
      document.getElementById("add-to-cart-form").addEventListener("submit", function (e) {
        const visibleQty = parseInt(document.getElementById("quantity").value, 10);
        document.querySelectorAll('#add-to-cart-form input[name="quantity"]').forEach(el => {
          el.value = visibleQty;
        });
      });
      document.getElementById("footer-add-form").addEventListener("submit", function (e) {
        const visibleQty = parseInt(document.getElementById("quantity").value, 10);
        document.querySelectorAll('#footer-add-form input[name="quantity"]').forEach(el => {
          el.value = visibleQty;
        });
      });

      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("buy-now-btn").addEventListener("click", e => {
          const qty = parseInt(document.getElementById("quantity").value, 10);
          const variantID = "{{ variant.id }}";
          if (typeof onBuyNowClick === "function") {
            onBuyNowClick(e, false, [{ id: variantID, quantity: qty }]);
          } else {
            alert("Buy Now failed: GoKwik not loaded.");
            console.error("onBuyNowClick is not available.");
          }
        });
      });

      document.addEventListener("DOMContentLoaded", () => {
        // Hero Buy Now
        const heroBtn = document.getElementById("custom-buy-now");
        heroBtn.classList.add("btn-buy-la14");
        heroBtn.addEventListener("click", e => {
          const qty = 1; // hero always qty=1
          const variantID = "{{ variant.id }}";
          if (typeof onBuyNowClick === "function") {
            onBuyNowClick(e, false, [{ id: variantID, quantity: qty }]);
          } else {
            alert("Buy Now failed: GoKwik not loaded.");
            console.error("onBuyNowClick is not available.");
          }
        });
      });

      document.addEventListener("DOMContentLoaded", function () {
        const footer = document.getElementById("fixedFooter");
        const hero = document.querySelector(".hero-bg");

        function toggleFooterVisibility() {
          if (!hero) return;
          if (hero.getBoundingClientRect().bottom <= 0) {
            footer.style.display = "flex";
          } else {
            footer.style.display = "none";
          }
        }

        window.addEventListener("scroll", toggleFooterVisibility);
      });

      document.addEventListener("DOMContentLoaded", () => {
        const footer = document.getElementById("fixedFooter");
        const hero = document.querySelector(".hero-bg");

        function toggleFooter() {
          if (hero.getBoundingClientRect().bottom <= 0) {
            footer.classList.add("show");
          } else {
            footer.classList.remove("show");
          }
        }
        window.addEventListener("scroll", toggleFooter);
        toggleFooter();

        document.getElementById("footer-buy").addEventListener("click", e => {
          const qty = parseInt(document.getElementById("quantity").value, 10) || 1;
          const variantID = "{{ variant.id }}";
          if (typeof onBuyNowClick === "function") {
            onBuyNowClick(e, false, [{ id: variantID, quantity: qty }]);
          } else {
            alert("Buy Now failed: GoKwik not loaded.");
          }
        });
      });
    </script>
  </body>
